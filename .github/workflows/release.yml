name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: List tags
        run: git tag

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git tag | tail -n 1)
          echo "::set-output name=latest::$latest_tag"

      - name: Print latest tag
        run: |
          echo "Latest tag is: ${{ steps.get_latest_tag.outputs.latest }}"
