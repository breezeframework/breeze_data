name: Tag and Push

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Get the latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null)
          if [ -z "$latest_tag" ]; then
            echo "No tags found. Starting from v0.1.0."
            latest_tag="v0.1.0"
          fi
          echo "Latest tag is: $latest_tag"
          echo "::set-output name=latest::$latest_tag"

      - name: Increment version
        id: increment_version
        run: |
          new_tag=$(echo "${{ steps.get_latest_tag.outputs.latest }}" | awk -F. -v OFS=. '{$NF++; print}')
          echo "Creating new tag: $new_tag"
          echo "::set-output name=new_tag::$new_tag"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push new tag
        run: |
          git tag ${{ steps.increment_version.outputs.new_tag }}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/breezeframework/breeze_data.git ${{ steps.increment_version.outputs.new_tag }}
