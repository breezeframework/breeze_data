name: Create Tag

on:
  push:
    branches:
      - main

jobs:
  create_tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Get the latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null)
          if [ -z "$latest_tag" ]; then
            echo "No tags found. Starting from v0.1.0."
            latest_tag="v0.1.0"
          fi
          echo "Latest tag is: $latest_tag"
          echo "::set-output name=latest::$latest_tag"

      - name: Increment the version
        id: increment_version
        run: |
          # Удаляем префикс 'v' и разбиваем по точке
          tag_without_v="${{ steps.get_latest_tag.outputs.latest }}"
          major=${tag_without_v%%.*}
          minor=${tag_without_v#*.}
          minor=${minor%%.*}
          patch=${tag_without_v##*.}
          new_patch=$((patch + 1))
          # Формируем новый тег
          new_tag="v${major}.${minor}.${new_patch}"
          echo "New tag will be: $new_tag"
          echo "::set-output name=new_tag::$new_tag"

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create new tag
        run: |
          git tag ${{ steps.increment_version.outputs.new_tag }}
          git push origin ${{ steps.increment_version.outputs.new_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
