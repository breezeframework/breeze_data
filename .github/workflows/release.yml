name: Increment and Push Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Чтобы получить все теги

      - name: Get latest tag
        id: get_latest_tag
        run: |
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1 2>/dev/null`)
          if [ -z "$latest_tag" ]; then
            echo "No tags found. Starting from v0.1.0."
            latest_tag="v0.1.0"
          fi
          echo "Latest tag is: $latest_tag"
          echo "::set-output name=latest::$latest_tag"

      - name: Increment version
        id: increment_version
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.get_latest_tag.outputs.latest }}"
          new_patch=$((patch + 1))
          new_tag="${major}.${minor}.${new_patch}"
          echo "New tag is: $new_tag"
          echo "::set-output name=new_tag::$new_tag"

      - name: Create new tag
        run: |
          echo "Creating new tag: ${{ steps.increment_version.outputs.new_tag }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.increment_version.outputs.new_tag }}
          git push origin ${{ steps.increment_version.outputs.new_tag }}
